procs:
  redis:
    shell: "trap '$HOME/redis/stop.sh' EXIT; $HOME/redis/start.sh && echo 'Redis running — will stop on exit.' && while true; do sleep 86400; done"
    autostart: true
  web:
    shell: "pnpm --filter web dev"
  receiver:
    shell: "set -a && . ./.env.local && set +a && cd apps/receiver-rs && $HOME/.cargo/bin/cargo run"
